name: ai-invoice-app

services:
  - name: backend
    environment_slug: node-js
    github:
      repo: BestDeveloperOfTheEra/AI-INVOICE
      branch: main
      deploy_on_push: true
    source_dir: backend
    build_command: npx prisma generate && npm run build
    run_command: npx prisma migrate deploy && npm run start:prod
    http_port: 3001
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${document-db.DATABASE_URL}
      - key: FRONTEND_URL
        scope: RUN_TIME
        value: ${frontend.PUBLIC_URL}
      - key: PORT
        scope: RUN_TIME
        value: "3001"
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
    routes:
      - path: /api
    health_check:
      http_path: /api/health

  - name: frontend
    environment_slug: node-js
    github:
      repo: BestDeveloperOfTheEra/AI-INVOICE
      branch: main
      deploy_on_push: true
    source_dir: frontend
    build_command: npm run build
    run_command: npm run start
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: NEXT_PUBLIC_API_URL
        scope: RUN_AND_BUILD_TIME
        value: ${backend.PUBLIC_URL}/api
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
    routes:
      - path: /

databases:
  - name: document-db
    engine: PG
    version: "16"
    production: false