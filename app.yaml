name: antigravity-app
services:
  - name: backend
    source_dir: backend
    build_command: npm run build
    run_command: npm run start:prod
    http_port: 3001
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${document_db.DATABASE_URL}
      - key: FRONTEND_URL
        scope: RUN_TIME
        value: ${APP_URL}
      - key: PORT
        scope: RUN_TIME
        value: "3001"
    routes:
      - path: /api
    # Health check is important for App Platform
    health_check:
      http_path: /api/health
  - name: frontend
    source_dir: frontend
    build_command: npm run build
    run_command: npm run start
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: NEXT_PUBLIC_API_URL
        scope: RUN_AND_BUILD_TIME
        value: ${backend.PUBLIC_URL}/api
    routes:
      - path: /
databases:
  - name: document_db
    engine: PG
    version: "16"
    production: false # Set to true for production tier
